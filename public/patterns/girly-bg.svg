<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <!-- Big Lollipop -->
  <g transform="translate(25,15)" opacity="0.16">
    <!-- Stick -->
    <rect x="13" y="30" width="4" height="25" fill="#d4a060" rx="1.5"/>
    <!-- Candy -->
    <circle cx="15" cy="18" r="16" fill="#f72d8c"/>
    <!-- Swirl -->
    <path d="M5,12 Q15,2 25,12" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.4"/>
    <path d="M3,18 Q15,8 27,18" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.35"/>
    <path d="M5,24 Q15,14 25,24" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.3"/>
    <path d="M9,28 Q15,22 21,28" fill="none" stroke="#fff" stroke-width="2" opacity="0.25"/>
  </g>

  <!-- Cupcake -->
  <g transform="translate(130,10)" opacity="0.15">
    <!-- Wrapper -->
    <path d="M0,28 L5,45 L35,45 L40,28 Z" fill="#ffb3d9"/>
    <line x1="10" y1="28" x2="12" y2="45" stroke="#f72d8c" stroke-width="0.8" opacity="0.4"/>
    <line x1="20" y1="28" x2="20" y2="45" stroke="#f72d8c" stroke-width="0.8" opacity="0.4"/>
    <line x1="30" y1="28" x2="28" y2="45" stroke="#f72d8c" stroke-width="0.8" opacity="0.4"/>
    <!-- Frosting layers -->
    <ellipse cx="20" cy="23" rx="18" ry="8" fill="#ff69b4"/>
    <ellipse cx="20" cy="17" rx="14" ry="7" fill="#ffb6c1"/>
    <ellipse cx="20" cy="12" rx="9" ry="6" fill="#ff69b4"/>
    <!-- Cherry on top -->
    <circle cx="20" cy="6" r="4.5" fill="#dc143c"/>
    <circle cx="18" cy="4" r="1.5" fill="#fff" opacity="0.3"/>
    <path d="M20,6 Q23,1 26,2" fill="none" stroke="#228b22" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Wrapped Candy 1 -->
  <g transform="translate(80,90)" opacity="0.15">
    <ellipse cx="15" cy="12" rx="14" ry="10" fill="#da70d6"/>
    <!-- Wrapper ends -->
    <polygon points="-1,9 -10,4 -8,16" fill="#e8a0e8"/>
    <polygon points="31,9 40,4 38,16" fill="#e8a0e8"/>
    <!-- Stripes -->
    <line x1="5" y1="5" x2="9" y2="19" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <line x1="13" y1="3" x2="17" y2="21" stroke="#fff" stroke-width="2" opacity="0.35"/>
    <line x1="21" y1="5" x2="25" y2="19" stroke="#fff" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Big Heart -->
  <g transform="translate(175,95)" opacity="0.15">
    <path d="M12,10 C12,5 5,-1 0,5 C-5,-1 -12,5 -12,10 C-12,18 0,26 0,26 C0,26 12,18 12,10Z" fill="#f72d8c"/>
    <path d="M-6,5 Q0,0 4,5" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Lollipop 2 (smaller, different color) -->
  <g transform="translate(170,170)" opacity="0.14">
    <rect x="9" y="22" width="3" height="18" fill="#d4a060" rx="1"/>
    <circle cx="10.5" cy="14" r="12" fill="#da70d6"/>
    <path d="M4,9 Q10.5,3 17,9" fill="none" stroke="#fff" stroke-width="2" opacity="0.35"/>
    <path d="M3,14 Q10.5,8 18,14" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <path d="M4,19 Q10.5,13 17,19" fill="none" stroke="#fff" stroke-width="2" opacity="0.25"/>
  </g>

  <!-- Bow -->
  <g transform="translate(35,165)" opacity="0.14">
    <ellipse cx="-8" cy="0" rx="10" ry="7" fill="#ff69b4" transform="rotate(-15,-8,0)"/>
    <ellipse cx="8" cy="0" rx="10" ry="7" fill="#ff69b4" transform="rotate(15,8,0)"/>
    <circle cx="0" cy="0" r="4" fill="#f72d8c"/>
    <path d="M-3,4 L-5,16" stroke="#f72d8c" stroke-width="2" stroke-linecap="round"/>
    <path d="M3,4 L5,16" stroke="#f72d8c" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wrapped Candy 2 (round) -->
  <g transform="translate(100,170)" opacity="0.13">
    <circle cx="12" cy="12" r="11" fill="#ff69b4"/>
    <path d="M5,5 Q12,12 19,5" fill="none" stroke="#fff" stroke-width="2" opacity="0.35"/>
    <path d="M5,12 Q12,19 19,12" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <circle cx="9" cy="9" r="2" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Small hearts scattered -->
  <g transform="translate(105,40)" opacity="0.12">
    <path d="M6,5 C6,2.5 3,0 0,2.5 C-3,0 -6,2.5 -6,5 C-6,9 0,12 0,12 C0,12 6,9 6,5Z" fill="#ffb3d9"/>
  </g>
  <g transform="translate(200,55)" opacity="0.11">
    <path d="M5,4 C5,2 2.5,0 0,2 C-2.5,0 -5,2 -5,4 C-5,7 0,10 0,10 C0,10 5,7 5,4Z" fill="#da70d6"/>
  </g>
  <g transform="translate(60,130)" opacity="0.10">
    <path d="M4,3 C4,1.5 2,0 0,1.5 C-2,0 -4,1.5 -4,3 C-4,5.5 0,7.5 0,7.5 C0,7.5 4,5.5 4,3Z" fill="#f72d8c"/>
  </g>

  <!-- Stars -->
  <g transform="translate(210,140)" opacity="0.11">
    <polygon points="0,-6 2,-2 6,-2 3,1 4,5 0,3 -4,5 -3,1 -6,-2 -2,-2" fill="#f72d8c"/>
  </g>
  <g transform="translate(75,60)" opacity="0.09">
    <polygon points="0,-5 1.5,-1.5 5,-1.5 2.5,0.8 3,4 0,2.5 -3,4 -2.5,0.8 -5,-1.5 -1.5,-1.5" fill="#da70d6"/>
  </g>

  <!-- Diamond -->
  <g transform="translate(15,110)" opacity="0.10">
    <polygon points="0,-8 6,0 0,8 -6,0" fill="#ff69b4"/>
    <polygon points="0,-5 3,0 0,5 -3,0" fill="#ffb3d9" opacity="0.5"/>
  </g>
</svg>
