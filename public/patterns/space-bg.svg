<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <!-- Stars (tiny dots scattered) -->
  <circle cx="15" cy="20" r="1" fill="#fff" opacity="0.15"/>
  <circle cx="55" cy="8" r="1.5" fill="#fff" opacity="0.12"/>
  <circle cx="95" cy="35" r="1" fill="#fff" opacity="0.18"/>
  <circle cx="140" cy="12" r="1.2" fill="#fff" opacity="0.14"/>
  <circle cx="180" cy="28" r="1" fill="#fff" opacity="0.16"/>
  <circle cx="220" cy="15" r="1.5" fill="#fff" opacity="0.13"/>
  <circle cx="260" cy="40" r="1" fill="#fff" opacity="0.15"/>
  <circle cx="30" cy="75" r="1" fill="#fff" opacity="0.14"/>
  <circle cx="110" cy="80" r="1.3" fill="#fff" opacity="0.16"/>
  <circle cx="200" cy="70" r="1" fill="#fff" opacity="0.12"/>
  <circle cx="250" cy="90" r="1.5" fill="#fff" opacity="0.15"/>
  <circle cx="45" cy="130" r="1" fill="#fff" opacity="0.13"/>
  <circle cx="160" cy="140" r="1.2" fill="#fff" opacity="0.17"/>
  <circle cx="270" cy="135" r="1" fill="#fff" opacity="0.14"/>
  <circle cx="80" cy="175" r="1.5" fill="#fff" opacity="0.12"/>
  <circle cx="130" cy="190" r="1" fill="#fff" opacity="0.16"/>
  <circle cx="230" cy="180" r="1.3" fill="#fff" opacity="0.15"/>
  <circle cx="20" cy="220" r="1" fill="#fff" opacity="0.14"/>
  <circle cx="100" cy="240" r="1.5" fill="#fff" opacity="0.13"/>
  <circle cx="190" cy="230" r="1" fill="#fff" opacity="0.17"/>
  <circle cx="260" cy="250" r="1.2" fill="#fff" opacity="0.15"/>
  <circle cx="50" cy="260" r="1" fill="#fff" opacity="0.12"/>
  <circle cx="170" cy="270" r="1" fill="#fff" opacity="0.16"/>

  <!-- Twinkling stars (bigger, with glow) -->
  <g transform="translate(70,50)" opacity="0.20">
    <polygon points="0,-5 1.5,-1.5 5,-1.5 2.5,0.8 3.2,4 0,2.5 -3.2,4 -2.5,0.8 -5,-1.5 -1.5,-1.5" fill="#e8e6f0"/>
  </g>
  <g transform="translate(210,110)" opacity="0.18">
    <polygon points="0,-4 1.2,-1.2 4,-1.2 2,0.6 2.5,3.2 0,2 -2.5,3.2 -2,0.6 -4,-1.2 -1.2,-1.2" fill="#c4b5fd"/>
  </g>
  <g transform="translate(35,200)" opacity="0.16">
    <polygon points="0,-6 2,-2 6,-2 3,1 4,5 0,3 -4,5 -3,1 -6,-2 -2,-2" fill="#e8e6f0"/>
  </g>
  <g transform="translate(240,210)" opacity="0.17">
    <polygon points="0,-4 1.2,-1.2 4,-1.2 2,0.6 2.5,3.2 0,2 -2.5,3.2 -2,0.6 -4,-1.2 -1.2,-1.2" fill="#fbbf24"/>
  </g>

  <!-- Constellation (connected stars) -->
  <g transform="translate(130,55)" opacity="0.14">
    <circle cx="0" cy="0" r="2.5" fill="#c4b5fd"/>
    <circle cx="25" cy="-10" r="2" fill="#c4b5fd"/>
    <circle cx="45" cy="5" r="2.5" fill="#c4b5fd"/>
    <circle cx="35" cy="25" r="2" fill="#c4b5fd"/>
    <circle cx="10" cy="20" r="2" fill="#c4b5fd"/>
    <line x1="0" y1="0" x2="25" y2="-10" stroke="#c4b5fd" stroke-width="0.8" opacity="0.6"/>
    <line x1="25" y1="-10" x2="45" y2="5" stroke="#c4b5fd" stroke-width="0.8" opacity="0.6"/>
    <line x1="45" y1="5" x2="35" y2="25" stroke="#c4b5fd" stroke-width="0.8" opacity="0.6"/>
    <line x1="35" y1="25" x2="10" y2="20" stroke="#c4b5fd" stroke-width="0.8" opacity="0.6"/>
    <line x1="10" y1="20" x2="0" y2="0" stroke="#c4b5fd" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Saturn -->
  <g transform="translate(40,100)" opacity="0.15">
    <circle cx="18" cy="18" r="14" fill="#d4956b"/>
    <!-- Bands -->
    <ellipse cx="18" cy="15" rx="13" ry="3" fill="#c4854b" opacity="0.4"/>
    <ellipse cx="18" cy="21" rx="12" ry="2.5" fill="#e4a56b" opacity="0.3"/>
    <!-- Ring -->
    <ellipse cx="18" cy="18" rx="26" ry="7" fill="none" stroke="#e4c89b" stroke-width="3" opacity="0.5"/>
    <ellipse cx="18" cy="18" rx="23" ry="5.5" fill="none" stroke="#d4b88b" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Small planet (blue/green Earth-like) -->
  <g transform="translate(210,160)" opacity="0.14">
    <circle cx="12" cy="12" r="10" fill="#3b82f6"/>
    <ellipse cx="8" cy="9" rx="5" ry="4" fill="#22c55e" opacity="0.5"/>
    <ellipse cx="15" cy="15" rx="4" ry="3" fill="#22c55e" opacity="0.4"/>
    <circle cx="12" cy="12" r="10" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Moon -->
  <g transform="translate(160,210)" opacity="0.13">
    <circle cx="10" cy="10" r="9" fill="#d1d5db"/>
    <circle cx="6" cy="7" r="2.5" fill="#b0b5bd" opacity="0.5"/>
    <circle cx="13" cy="5" r="1.5" fill="#b0b5bd" opacity="0.4"/>
    <circle cx="11" cy="13" r="2" fill="#b0b5bd" opacity="0.5"/>
    <circle cx="5" cy="13" r="1" fill="#b0b5bd" opacity="0.3"/>
  </g>

  <!-- Rocket -->
  <g transform="translate(100,140)" opacity="0.13">
    <!-- Body -->
    <ellipse cx="10" cy="18" rx="7" ry="16" fill="#e8e6f0"/>
    <!-- Nose cone -->
    <path d="M3,5 Q10,-5 17,5" fill="#7c6ef0"/>
    <!-- Window -->
    <circle cx="10" cy="14" r="3.5" fill="#3b82f6"/>
    <circle cx="10" cy="14" r="2.5" fill="#60a5fa"/>
    <circle cx="9" cy="13" r="1" fill="#fff" opacity="0.4"/>
    <!-- Fins -->
    <polygon points="3,28 -3,35 3,32" fill="#7c6ef0"/>
    <polygon points="17,28 23,35 17,32" fill="#7c6ef0"/>
    <!-- Flame -->
    <ellipse cx="10" cy="36" rx="4" ry="6" fill="#f97316" opacity="0.7"/>
    <ellipse cx="10" cy="35" rx="2.5" ry="4" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Shooting star -->
  <g transform="translate(180,40)" opacity="0.12">
    <line x1="0" y1="0" x2="30" y2="20" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="15" y2="10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff"/>
  </g>

  <!-- Nebula glow -->
  <ellipse cx="60" cy="240" rx="30" ry="20" fill="#7c6ef0" opacity="0.04"/>
  <ellipse cx="230" cy="60" rx="25" ry="18" fill="#c4b5fd" opacity="0.03"/>
</svg>
