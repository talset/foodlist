  <g transform="translate(30,60)" opacity="0.13">
    <path d="M0,3 C0,0 -5,-2 -5,2 C-5,5 0,8 0,8 C0,8 5,5 5,2 C5,-2 0,0 0,3Z" fill="#ffb3c1"/>
  </g>

  <!-- Small star -->
  <g transform="translate(85,160)" opacity="0.13">
    <polygon points="0,-6 2,-2 6,-2 3,1 4,5 0,3 -4,5 -3,1 -6,-2 -2,-2" fill="#ffe066"/>
