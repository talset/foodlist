<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Chibi Shiba 1 -->
  <g transform="translate(25,20)" opacity="0.15">
    <ellipse cx="15" cy="18" rx="14" ry="12" fill="#d4956b"/>
    <polygon points="4,10 0,0 10,6" fill="#d4956b"/>
    <polygon points="26,10 30,0 20,6" fill="#d4956b"/>
    <polygon points="5,9 2,2 9,6" fill="#f5c49a"/>
    <polygon points="25,9 28,2 21,6" fill="#f5c49a"/>
    <ellipse cx="15" cy="21" rx="10" ry="8" fill="#fef3e0"/>
    <circle cx="10" cy="16" r="2" fill="#2d1a0e"/>
    <circle cx="20" cy="16" r="2" fill="#2d1a0e"/>
    <circle cx="11" cy="15" r="0.7" fill="#fff"/>
    <circle cx="21" cy="15" r="0.7" fill="#fff"/>
    <ellipse cx="15" cy="20" rx="2" ry="1.5" fill="#2d1a0e"/>
    <path d="M13,22 Q15,25 17,22" fill="none" stroke="#2d1a0e" stroke-width="0.8"/>
    <ellipse cx="7" cy="20" rx="3" ry="2" fill="#ffb3c1" opacity="0.5"/>
    <ellipse cx="23" cy="20" rx="3" ry="2" fill="#ffb3c1" opacity="0.5"/>
  </g>

  <!-- Flower 1 (pink) -->
  <g transform="translate(90,15)" opacity="0.17">
    <circle cx="0" cy="-6" r="4" fill="#ffb3d9"/>
    <circle cx="5.7" cy="-1.8" r="4" fill="#ffb3d9"/>
    <circle cx="3.5" cy="4.8" r="4" fill="#ffb3d9"/>
    <circle cx="-3.5" cy="4.8" r="4" fill="#ffb3d9"/>
    <circle cx="-5.7" cy="-1.8" r="4" fill="#ffb3d9"/>
    <circle cx="0" cy="0" r="3" fill="#ffe066"/>
  </g>

  <!-- Flower 2 (blue) -->
  <g transform="translate(155,55)" opacity="0.15">
    <circle cx="0" cy="-5" r="3.5" fill="#a3d5ff"/>
    <circle cx="4.8" cy="-1.5" r="3.5" fill="#a3d5ff"/>
    <circle cx="3" cy="4" r="3.5" fill="#a3d5ff"/>
    <circle cx="-3" cy="4" r="3.5" fill="#a3d5ff"/>
    <circle cx="-4.8" cy="-1.5" r="3.5" fill="#a3d5ff"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff4b3"/>
  </g>

  <!-- Chibi Shiba 2 -->
  <g transform="translate(120,110)" opacity="0.15">
    <ellipse cx="15" cy="18" rx="14" ry="12" fill="#d4956b"/>
    <polygon points="4,10 0,0 10,6" fill="#d4956b"/>
    <polygon points="26,10 30,0 20,6" fill="#d4956b"/>
    <polygon points="5,9 2,2 9,6" fill="#f5c49a"/>
    <polygon points="25,9 28,2 21,6" fill="#f5c49a"/>
    <ellipse cx="15" cy="21" rx="10" ry="8" fill="#fef3e0"/>
    <circle cx="10" cy="16" r="2" fill="#2d1a0e"/>
    <circle cx="20" cy="16" r="2" fill="#2d1a0e"/>
    <circle cx="11" cy="15" r="0.7" fill="#fff"/>
    <circle cx="21" cy="15" r="0.7" fill="#fff"/>
    <ellipse cx="15" cy="20" rx="2" ry="1.5" fill="#2d1a0e"/>
    <path d="M13,22 Q15,25 17,22" fill="none" stroke="#2d1a0e" stroke-width="0.8"/>
    <ellipse cx="7" cy="20" rx="3" ry="2" fill="#ffb3c1" opacity="0.5"/>
    <ellipse cx="23" cy="20" rx="3" ry="2" fill="#ffb3c1" opacity="0.5"/>
  </g>

  <!-- Flower 3 (green) -->
  <g transform="translate(40,100)" opacity="0.17">
    <circle cx="0" cy="-5" r="3.5" fill="#b8e6b8"/>
    <circle cx="4.8" cy="-1.5" r="3.5" fill="#b8e6b8"/>
    <circle cx="3" cy="4" r="3.5" fill="#b8e6b8"/>
    <circle cx="-3" cy="4" r="3.5" fill="#b8e6b8"/>
    <circle cx="-4.8" cy="-1.5" r="3.5" fill="#b8e6b8"/>
