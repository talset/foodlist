<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <!-- Big tree -->
  <g transform="translate(90,20)" opacity="0.10">
    <!-- Trunk -->
    <rect x="25" y="80" width="18" height="60" fill="#6b4226" rx="3"/>
    <rect x="20" y="130" width="28" height="10" fill="#6b4226" rx="2"/>
    <!-- Branches -->
    <path d="M34,85 Q10,70 5,50" fill="none" stroke="#6b4226" stroke-width="4" stroke-linecap="round"/>
    <path d="M34,85 Q55,65 65,50" fill="none" stroke="#6b4226" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M34,70 Q20,55 8,40" fill="none" stroke="#6b4226" stroke-width="3" stroke-linecap="round"/>
    <path d="M34,75 Q50,55 58,38" fill="none" stroke="#6b4226" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Foliage -->
    <ellipse cx="5" cy="38" rx="18" ry="16" fill="#4a8c5c"/>
    <ellipse cx="34" cy="25" rx="22" ry="20" fill="#3d7a4a"/>
    <ellipse cx="60" cy="35" rx="18" ry="16" fill="#4a8c5c"/>
    <ellipse cx="20" cy="50" rx="15" ry="12" fill="#5a9e6a"/>
    <ellipse cx="50" cy="48" rx="16" ry="13" fill="#5a9e6a"/>
    <ellipse cx="34" cy="42" rx="20" ry="15" fill="#3d7a4a"/>
    <!-- Small leaves falling -->
    <ellipse cx="-5" cy="70" rx="3" ry="1.5" fill="#5a9e6a" transform="rotate(-30,-5,70)"/>
    <ellipse cx="72" cy="65" rx="2.5" ry="1.2" fill="#4a8c5c" transform="rotate(25,72,65)"/>
  </g>

  <!-- Chibi Fox (bottom left) -->
  <g transform="translate(15,180)" opacity="0.13">
    <!-- Body -->
    <ellipse cx="15" cy="22" rx="12" ry="10" fill="#d4713a"/>
    <!-- Head -->
    <ellipse cx="15" cy="12" rx="11" ry="10" fill="#d4713a"/>
    <!-- Ears -->
    <polygon points="6,6 2,-4 12,2" fill="#d4713a"/>
    <polygon points="24,6 28,-4 18,2" fill="#d4713a"/>
    <polygon points="7,5 4,-2 11,2" fill="#fef3e0"/>
    <polygon points="23,5 26,-2 19,2" fill="#fef3e0"/>
    <!-- White face -->
    <ellipse cx="15" cy="16" rx="8" ry="7" fill="#fef3e0"/>
    <!-- Eyes -->
    <circle cx="11" cy="11" r="1.8" fill="#2d1a0e"/>
    <circle cx="19" cy="11" r="1.8" fill="#2d1a0e"/>
    <circle cx="11.5" cy="10.5" r="0.6" fill="#fff"/>
    <circle cx="19.5" cy="10.5" r="0.6" fill="#fff"/>
    <!-- Nose -->
    <ellipse cx="15" cy="14" rx="1.8" ry="1.3" fill="#2d1a0e"/>
    <!-- Mouth -->
    <path d="M13.5,15.5 Q15,17.5 16.5,15.5" fill="none" stroke="#2d1a0e" stroke-width="0.7"/>
    <!-- Blush -->
    <ellipse cx="8" cy="14" rx="2.5" ry="1.5" fill="#ffb3c1" opacity="0.4"/>
    <ellipse cx="22" cy="14" rx="2.5" ry="1.5" fill="#ffb3c1" opacity="0.4"/>
    <!-- Tail -->
    <path d="M27,22 Q35,15 32,8" fill="none" stroke="#d4713a" stroke-width="4" stroke-linecap="round"/>
    <path d="M32,8 Q31,6 33,7" fill="#fef3e0" stroke="none"/>
    <circle cx="32" cy="8" r="2.5" fill="#fef3e0"/>
  </g>

  <!-- Chibi Bear (bottom right) -->
  <g transform="translate(185,185)" opacity="0.12">
    <!-- Body -->
    <ellipse cx="15" cy="24" rx="13" ry="11" fill="#7a5a3a"/>
    <!-- Head -->
    <ellipse cx="15" cy="13" rx="12" ry="11" fill="#7a5a3a"/>
    <!-- Ears -->
    <circle cx="5" cy="4" r="5" fill="#7a5a3a"/>
    <circle cx="25" cy="4" r="5" fill="#7a5a3a"/>
    <circle cx="5" cy="4" r="3" fill="#a07050"/>
    <circle cx="25" cy="4" r="3" fill="#a07050"/>
    <!-- Muzzle -->
    <ellipse cx="15" cy="17" rx="7" ry="5" fill="#a07050"/>
    <!-- Eyes -->
    <circle cx="10" cy="12" r="2" fill="#2d1a0e"/>
    <circle cx="20" cy="12" r="2" fill="#2d1a0e"/>
    <circle cx="10.5" cy="11.5" r="0.6" fill="#fff"/>
    <circle cx="20.5" cy="11.5" r="0.6" fill="#fff"/>
    <!-- Nose -->
    <ellipse cx="15" cy="15" rx="2.2" ry="1.6" fill="#2d1a0e"/>
    <!-- Mouth -->
    <path d="M13,17 Q15,19.5 17,17" fill="none" stroke="#2d1a0e" stroke-width="0.7"/>
    <!-- Blush -->
    <ellipse cx="7" cy="15" rx="2.5" ry="1.5" fill="#ffb3c1" opacity="0.35"/>
    <ellipse cx="23" cy="15" rx="2.5" ry="1.5" fill="#ffb3c1" opacity="0.35"/>
  </g>

  <!-- Chibi Squirrel (middle right) -->
  <g transform="translate(200,90)" opacity="0.11">
    <!-- Body -->
    <ellipse cx="12" cy="20" rx="9" ry="8" fill="#b07840"/>
    <!-- Head -->
    <ellipse cx="12" cy="11" rx="9" ry="8" fill="#b07840"/>
    <!-- Ears -->
    <polygon points="5,5 2,-2 9,2" fill="#b07840"/>
    <polygon points="19,5 22,-2 15,2" fill="#b07840"/>
    <polygon points="6,4 3,-1 8,2" fill="#d4a060"/>
    <polygon points="18,4 21,-1 16,2" fill="#d4a060"/>
    <!-- White belly -->
    <ellipse cx="12" cy="14" rx="6" ry="5" fill="#fef3e0"/>
    <!-- Eyes -->
    <circle cx="9" cy="10" r="1.8" fill="#2d1a0e"/>
    <circle cx="15" cy="10" r="1.8" fill="#2d1a0e"/>
    <circle cx="9.5" cy="9.5" r="0.5" fill="#fff"/>
    <circle cx="15.5" cy="9.5" r="0.5" fill="#fff"/>
    <!-- Nose -->
    <ellipse cx="12" cy="13" rx="1.5" ry="1" fill="#2d1a0e"/>
    <!-- Blush -->
    <ellipse cx="6" cy="12" rx="2" ry="1.2" fill="#ffb3c1" opacity="0.4"/>
    <ellipse cx="18" cy="12" rx="2" ry="1.2" fill="#ffb3c1" opacity="0.4"/>
    <!-- Big fluffy tail -->
    <path d="M21,20 Q30,10 28,0 Q26,-2 24,2 Q28,12 21,18" fill="#b07840"/>
    <path d="M24,2 Q25,5 23,8" fill="#d4a060" stroke="none"/>
  </g>

  <!-- Mushrooms -->
  <g transform="translate(60,200)" opacity="0.10">
    <rect x="5" y="10" width="4" height="8" fill="#f0e0c8" rx="1"/>
    <ellipse cx="7" cy="10" rx="8" ry="6" fill="#c0392b"/>
    <circle cx="4" cy="8" r="1.5" fill="#f0e0c8"/>
    <circle cx="10" cy="7" r="1" fill="#f0e0c8"/>
    <circle cx="7" cy="5" r="1.2" fill="#f0e0c8"/>
  </g>
  <g transform="translate(150,220)" opacity="0.09">
    <rect x="4" y="8" width="3" height="6" fill="#f0e0c8" rx="1"/>
    <ellipse cx="5.5" cy="8" rx="6" ry="4.5" fill="#c0392b"/>
    <circle cx="3" cy="6" r="1" fill="#f0e0c8"/>
    <circle cx="7" cy="5.5" r="0.8" fill="#f0e0c8"/>
  </g>

  <!-- Small flowers on ground -->
  <g transform="translate(120,235)" opacity="0.09">
    <circle cx="0" cy="-3" r="2" fill="#a8d8a8"/>
    <circle cx="2.8" cy="-0.9" r="2" fill="#a8d8a8"/>
    <circle cx="1.7" cy="2.4" r="2" fill="#a8d8a8"/>
    <circle cx="-1.7" cy="2.4" r="2" fill="#a8d8a8"/>
    <circle cx="-2.8" cy="-0.9" r="2" fill="#a8d8a8"/>
    <circle cx="0" cy="0" r="1.5" fill="#ffe066"/>
  </g>

  <!-- Acorn -->
  <g transform="translate(40,140)" opacity="0.09">
    <ellipse cx="5" cy="8" rx="4" ry="5" fill="#8b6b4a"/>
    <ellipse cx="5" cy="5" rx="5" ry="3" fill="#6b4226"/>
    <rect x="4" y="1" width="2" height="3" fill="#6b4226" rx="0.5"/>
  </g>
</svg>
