<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <!-- Big Sun with face -->
  <g transform="translate(35,25)" opacity="0.16">
    <circle cx="25" cy="25" r="18" fill="#fbbf24"/>
    <!-- Rays -->
    <line x1="25" y1="-1" x2="25" y2="-9" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="25" y1="51" x2="25" y2="59" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-1" y1="25" x2="-9" y2="25" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="51" y1="25" x2="59" y2="25" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="7" y1="7" x2="1" y2="1" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="43" y1="7" x2="49" y2="1" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="7" y1="43" x2="1" y2="49" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="43" y1="43" x2="49" y2="49" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <!-- Face -->
    <circle cx="19" cy="22" r="2.5" fill="#92400e"/>
    <circle cx="31" cy="22" r="2.5" fill="#92400e"/>
    <path d="M17,30 Q25,37 33,30" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="14" cy="28" rx="3.5" ry="2" fill="#f97316" opacity="0.3"/>
    <ellipse cx="36" cy="28" rx="3.5" ry="2" fill="#f97316" opacity="0.3"/>
  </g>

  <!-- Fluffy Cloud -->
  <g transform="translate(140,15)" opacity="0.14">
    <ellipse cx="25" cy="18" rx="22" ry="13" fill="#fef3c7"/>
    <ellipse cx="12" cy="22" rx="16" ry="11" fill="#fef3c7"/>
    <ellipse cx="40" cy="20" rx="17" ry="12" fill="#fef3c7"/>
    <ellipse cx="25" cy="24" rx="25" ry="10" fill="#fef3c7"/>
  </g>

  <!-- Big Sunflower -->
  <g transform="translate(160,105)" opacity="0.16">
    <!-- Stem -->
    <line x1="15" y1="22" x2="15" y2="45" stroke="#65a30d" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="7" cy="35" rx="7" ry="4" fill="#65a30d" transform="rotate(-20,7,35)"/>
    <!-- Petals -->
    <ellipse cx="15" cy="3" rx="4.5" ry="8" fill="#fbbf24"/>
    <ellipse cx="25" cy="6" rx="4.5" ry="8" fill="#fbbf24" transform="rotate(45,25,6)"/>
    <ellipse cx="28" cy="16" rx="4.5" ry="8" fill="#fbbf24" transform="rotate(90,28,16)"/>
    <ellipse cx="23" cy="26" rx="4.5" ry="8" fill="#fbbf24" transform="rotate(135,23,26)"/>
    <ellipse cx="15" cy="29" rx="4.5" ry="8" fill="#fbbf24" transform="rotate(180,15,29)"/>
    <ellipse cx="5" cy="24" rx="4.5" ry="8" fill="#fbbf24" transform="rotate(225,5,24)"/>
    <ellipse cx="2" cy="14" rx="4.5" ry="8" fill="#fbbf24" transform="rotate(270,2,14)"/>
    <ellipse cx="7" cy="6" rx="4.5" ry="8" fill="#fbbf24" transform="rotate(315,7,6)"/>
    <!-- Center -->
    <circle cx="15" cy="16" r="8" fill="#92400e"/>
    <circle cx="13" cy="14" r="1" fill="#7a3400" opacity="0.5"/>
    <circle cx="17" cy="13" r="1" fill="#7a3400" opacity="0.5"/>
    <circle cx="15" cy="18" r="1" fill="#7a3400" opacity="0.5"/>
  </g>

  <!-- Daisy -->
  <g transform="translate(30,150)" opacity="0.15">
    <circle cx="0" cy="-6" r="4" fill="#fff8e1"/>
    <circle cx="5.7" cy="-1.8" r="4" fill="#fff8e1"/>
    <circle cx="3.5" cy="4.8" r="4" fill="#fff8e1"/>
    <circle cx="-3.5" cy="4.8" r="4" fill="#fff8e1"/>
    <circle cx="-5.7" cy="-1.8" r="4" fill="#fff8e1"/>
    <circle cx="0" cy="0" r="3.5" fill="#fbbf24"/>
  </g>

  <!-- Rainbow -->
  <g transform="translate(75,170)" opacity="0.12">
    <path d="M0,35 Q30,-15 60,35" fill="none" stroke="#ef4444" stroke-width="3.5"/>
    <path d="M4,35 Q30,-11 56,35" fill="none" stroke="#f97316" stroke-width="3.5"/>
    <path d="M8,35 Q30,-7 52,35" fill="none" stroke="#fbbf24" stroke-width="3.5"/>
    <path d="M12,35 Q30,-3 48,35" fill="none" stroke="#22c55e" stroke-width="3.5"/>
    <path d="M16,35 Q30,1 44,35" fill="none" stroke="#3b82f6" stroke-width="3.5"/>
    <path d="M20,35 Q30,5 40,35" fill="none" stroke="#8b5cf6" stroke-width="3.5"/>
  </g>

  <!-- Butterfly -->
  <g transform="translate(110,65)" opacity="0.14">
    <ellipse cx="-7" cy="-4" rx="8" ry="6" fill="#f97316"/>
    <ellipse cx="7" cy="-4" rx="8" ry="6" fill="#f97316"/>
    <ellipse cx="-5" cy="4" rx="5.5" ry="4" fill="#fbbf24"/>
    <ellipse cx="5" cy="4" rx="5.5" ry="4" fill="#fbbf24"/>
    <ellipse cx="0" cy="0" rx="2" ry="6" fill="#92400e"/>
    <!-- Antennae -->
    <path d="M0,-6 Q-4,-12 -6,-11" fill="none" stroke="#92400e" stroke-width="1" stroke-linecap="round"/>
    <path d="M0,-6 Q4,-12 6,-11" fill="none" stroke="#92400e" stroke-width="1" stroke-linecap="round"/>
    <circle cx="-6" cy="-11" r="1.5" fill="#92400e"/>
    <circle cx="6" cy="-11" r="1.5" fill="#92400e"/>
  </g>

  <!-- Small cloud 2 -->
  <g transform="translate(10,90)" opacity="0.10">
    <ellipse cx="15" cy="10" rx="14" ry="8" fill="#fef3c7"/>
    <ellipse cx="7" cy="13" rx="10" ry="7" fill="#fef3c7"/>
    <ellipse cx="24" cy="12" rx="11" ry="7" fill="#fef3c7"/>
  </g>

  <!-- Stars -->
  <g transform="translate(200,190)" opacity="0.13">
    <polygon points="0,-7 2,-2.5 7,-2.5 3.5,1 4.5,6 0,3.5 -4.5,6 -3.5,1 -7,-2.5 -2,-2.5" fill="#fbbf24"/>
  </g>
  <g transform="translate(220,50)" opacity="0.11">
    <polygon points="0,-5 1.5,-1.8 5,-1.8 2.5,0.7 3.2,4.2 0,2.5 -3.2,4.2 -2.5,0.7 -5,-1.8 -1.5,-1.8" fill="#fbbf24"/>
  </g>
</svg>
