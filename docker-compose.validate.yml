services:

  # ── MySQL de test ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: foodlist
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptest"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "3307:3306"   # port alternatif pour ne pas entrer en conflit avec un MySQL local

  # ── Applique le schéma SQL et liste les tables ────────────────────────────────
  schema:
    image: mysql:8.0
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./sql:/sql:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        mysql -h mysql -uroot -ptest foodlist < /sql/schema.sql &&
        echo "✅ Schema appliqué" &&
        mysql -h mysql -uroot -ptest -e "SHOW TABLES;" foodlist

  # ── npm install + next build ──────────────────────────────────────────────────
  build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run build && echo '✅ Build OK'"

  # ── Dev complet avec DB ───────────────────────────────────────────────────────
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: foodlist
      DB_USER: root
      DB_PASSWORD: test
      NEXTAUTH_SECRET: validation_secret_change_me
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

volumes:
  node_modules:
