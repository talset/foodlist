services:
  mysql:
    image: mysql:9.6
    environment:
      MYSQL_ROOT_PASSWORD: foodlist
      MYSQL_DATABASE: foodlist
      MYSQL_USER: foodlist
      MYSQL_PASSWORD: foodlist
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pfoodlist"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./uploads/icons:/app/uploads/icons
      - ./uploads/recipes:/app/uploads/recipes
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
